name: CI

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Script help smoke test
        run: |
          python scripts/normalize_reference.py --help
          python scripts/extract_ref_manifest.py --help

      - name: Example manifest generation smoke test
        run: |
          python scripts/extract_ref_manifest.py examples/sample_references.md --out-dir examples/out --sleep 0
          test -f examples/out/ref_manifest.json
          test -f examples/out/ref_manifest.md
          test -f examples/out/ref_manifest.csv
